<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZI Labs — Laboratorios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #f8fafc;
  color: #0f172a;
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.mono { font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace; }

/* ─── Hero strip ─── */
.hero {
  background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
  padding: 44px 32px 40px;
  text-align: center;
}
.hero h1 {
  font-size: 28px;
  font-weight: 700;
  color: #ffffff;
  margin-bottom: 8px;
  letter-spacing: -0.3px;
}
.hero p {
  font-size: 14px;
  color: #94a3b8;
}

/* ─── Layout ─── */
.page-wrap {
  max-width: 1320px;
  margin: 0 auto;
  padding: 40px 32px 64px;
  width: 100%;
}

/* ─── Grid — single row ─── */
.lab-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}

/* ─── Card ─── */
.lab-card {
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s ease, transform 0.2s ease, box-shadow 0.2s ease;
  display: flex;
  flex-direction: column;
  box-shadow: 0 1px 3px rgba(15,23,42,0.04);
}
.lab-card:hover {
  border-color: #10b98160;
  transform: translateY(-3px);
  box-shadow: 0 8px 28px rgba(93, 202, 165, 0.10);
}
.lab-card:active { transform: translateY(-1px); }

.card-thumb {
  width: 100%;
  aspect-ratio: 16 / 10;
  object-fit: cover;
  display: block;
  background: #f1f5f9;
}

.card-body {
  padding: 14px 16px 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
}

.card-meta {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.lab-id {
  font-size: 12px;
  font-weight: 600;
  color: #10b981;
  letter-spacing: 0.5px;
}

.diff-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  letter-spacing: 0.3px;
}
.diff-Facil   { background: #d1fae5; color: #065f46; }
.diff-Medio   { background: #fef3c7; color: #92400e; }
.diff-Dificil { background: #fee2e2; color: #991b1b; }

.card-category {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 20px;
  background: #f1f5f9;
  color: #475569;
}

.card-network {
  font-size: 11px;
  color: #94a3b8;
}

.card-title {
  font-size: 14px;
  font-weight: 700;
  color: #0f172a;
  line-height: 1.3;
  margin-top: 2px;
}

.card-desc {
  font-size: 12px;
  color: #64748b;
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-footer {
  margin-top: auto;
  padding-top: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 1px solid #e2e8f0;
}

.card-missions {
  font-size: 11px;
  color: #94a3b8;
}

.card-btn {
  font-size: 11px;
  font-weight: 600;
  color: #64748b;
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  border-radius: 4px;
  transition: color 0.15s;
}
.lab-card:hover .card-btn {
  color: #10b981;
}

/* ─── Modal ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: rgba(0, 0, 0, 0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: auto;
}
.modal-overlay.closing {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.modal-panel {
  position: relative;
  background: #ffffff;
  border: 1px solid #e2e8f0;
  border-radius: 14px;
  width: 100%;
  max-width: 620px;
  max-height: 90vh;
  overflow-y: auto;
  transform: scale(0.85);
  opacity: 0;
  transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1.12), opacity 0.2s ease;
}
.modal-overlay.open .modal-panel {
  transform: scale(1);
  opacity: 1;
}
.modal-overlay.closing .modal-panel {
  transform: scale(0.85);
  opacity: 0;
  transition: transform 0.2s ease, opacity 0.18s ease;
}

.modal-close {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 32px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid #e2e8f0;
  background: #f8fafc;
  color: #64748b;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  z-index: 2;
  line-height: 1;
}
.modal-close:hover {
  background: #f1f5f9;
  color: #ef4444;
  border-color: #ef444460;
}

.modal-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  z-index: 1001;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid #334155;
  background: rgba(15, 23, 42, 0.8);
  backdrop-filter: blur(6px);
  color: #94a3b8;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s, color 0.15s, border-color 0.15s;
  user-select: none;
}
.modal-arrow:hover {
  background: #1e293b;
  color: #10b981;
  border-color: #10b98160;
}
.modal-arrow:active { transform: translateY(-50%) scale(0.93); }
.modal-arrow.prev { left: -56px; }
.modal-arrow.next { right: -56px; }
.modal-arrow.hidden { opacity: 0; pointer-events: none; }

/* ─── Modal content ─── */
.modal-content { padding: 0; }

.modal-thumb {
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  display: block;
  border-radius: 14px 14px 0 0;
  background: #f1f5f9;
}

.modal-info {
  padding: 22px 26px 26px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.modal-head {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 10px;
}

.cat-tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  background: #f1f5f9;
  color: #475569;
}

.modal-title {
  font-size: 20px;
  font-weight: 700;
  color: #0f172a;
  line-height: 1.3;
}

.modal-desc {
  font-size: 14px;
  color: #475569;
  line-height: 1.65;
}

.modal-details {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px 20px;
  padding-top: 4px;
}
.detail-item {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.detail-label {
  font-size: 11px;
  font-weight: 600;
  color: #94a3b8;
  text-transform: uppercase;
  letter-spacing: 0.8px;
}
.detail-value {
  font-size: 13px;
  color: #0f172a;
}
.detail-value.mono { font-size: 12px; }

.modal-cta {
  margin-top: 6px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 13px 28px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #10b981, #047857);
  color: #ffffff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  align-self: flex-start;
}
.modal-cta:hover {
  transform: scale(1.03);
  box-shadow: 0 6px 24px rgba(16, 185, 129, 0.30);
}
.modal-cta:active { transform: scale(0.98); }

/* ─── Scrollbar ─── */
.modal-panel::-webkit-scrollbar { width: 6px; }
.modal-panel::-webkit-scrollbar-track { background: transparent; }
.modal-panel::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
.modal-panel::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

/* ─── Responsive ─── */
@media (max-width: 900px) {
  .lab-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .lab-grid { grid-template-columns: 1fr; }
  .page-wrap { padding: 24px 16px 40px; }
  .modal-panel { max-width: 100%; margin: 0 8px; }
  .modal-info { padding: 18px; }
  .modal-details { grid-template-columns: 1fr; }
  .modal-arrow.prev { left: 8px; }
  .modal-arrow.next { right: 8px; }
}
</style>
</head>
<body>

<div class="hero">
  <h1>Laboratorios</h1>
  <p class="mono">Seleccioná un laboratorio para comenzar</p>
</div>

<div class="page-wrap">
  <div class="lab-grid" id="labGrid"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <button class="modal-arrow prev" id="prevBtn" aria-label="Anterior">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <button class="modal-arrow next" id="nextBtn" aria-label="Siguiente">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <div class="modal-panel" id="modalPanel">
    <button class="modal-close" id="closeBtn" aria-label="Cerrar">✕</button>
    <div class="modal-content" id="modalContent"></div>
  </div>
</div>

<script>
const LABS = [
  {
    id: '0x01',
    name: 'WordPress Vulnerable Lab',
    difficulty: 'Medio',
    category: 'Web',
    description: 'Enumeración web, descubrimiento de directorios y compromiso de WordPress.',
    tools: 'arp-scan, nmap, gobuster, ssh',
    net: '192.168.1.0/24',
    missions: 8,
    thumb: 'lab_images/lab01.png'
  },
  {
    id: '0x02',
    name: 'Web OSINT & SSH Compromise',
    difficulty: 'Facil',
    category: 'Web',
    description: 'Reconocimiento web, enumeración de nombres de usuario y compromiso de SSH usando Hydra.',
    tools: 'arp-scan, nmap, hydra, ssh',
    net: '10.10.10.0/24',
    missions: 6,
    thumb: 'lab_images/lab02.png'
  },
  {
    id: '0x03',
    name: 'EternalBlue MS17-010',
    difficulty: 'Facil',
    category: 'Network',
    description: 'Explotación EternalBlue en Windows 7 sin parchear mediante Metasploit.',
    tools: 'arp-scan, nmap, msfconsole',
    net: '172.16.0.0/24',
    missions: 5,
    thumb: 'lab_images/lab03.png'
  },
  {
    id: '0x04',
    name: 'LFI to RCE Lab',
    difficulty: 'Medio',
    category: 'Web',
    description: 'Explota LFI para ejecutar una shell remota (RCE) mediante log poisoning y PHP filter chains.',
    tools: 'arp-scan, nmap, curl, msfconsole',
    net: '192.168.20.0/24',
    missions: 7,
    thumb: 'lab_images/Lab04.png'
  },
  {
    id: '0x05',
    name: 'FTP Enumeration & Privilege Escalation',
    difficulty: 'Medio',
    category: 'Network',
    description: 'Enumeración mediante FTP anónimo, fuerza bruta SSH con Hydra y escalada de privilegios a root.',
    tools: 'arp-scan, nmap, ftp, hydra, ssh, sudo',
    net: '10.10.20.0/24',
    missions: 7,
    thumb: 'lab_images/Lab05.png'
  }
];

const grid = document.getElementById('labGrid');
const overlay = document.getElementById('modalOverlay');
const content = document.getElementById('modalContent');
const closeBtn = document.getElementById('closeBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');

let isOpen = false;
let isClosing = false;
let currentIndex = -1;

// ── Render grid ──
LABS.forEach((lab, i) => {
  const card = document.createElement('div');
  card.className = 'lab-card';
  card.innerHTML = `
    <img class="card-thumb" src="${lab.thumb}" alt="${lab.name}" loading="lazy">
    <div class="card-body">
      <div class="card-meta">
        <span class="lab-id mono">${lab.id}</span>
        <span class="diff-badge diff-${lab.difficulty} mono">${lab.difficulty}</span>
      </div>
      <div>
        <span class="card-category mono">${lab.category}</span>
        <span class="card-network mono">${lab.net}</span>
      </div>
      <div class="card-title">${lab.name}</div>
      <div class="card-desc">${lab.description}</div>
      <div class="card-footer">
        <span class="card-missions mono">${lab.missions} misiones</span>
        <button class="card-btn mono">
          Iniciar
          <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
        </button>
      </div>
    </div>
  `;
  card.addEventListener('click', (e) => {
    if (e.target.closest('.card-btn')) return;
    openModal(i);
  });
  grid.appendChild(card);
  // Add click on the .card-btn too
  const btn = card.querySelector('.card-btn');
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    openModal(i);
  });
});

// ── Modal content ──
function renderContent(index) {
  const lab = LABS[index];
  content.innerHTML = `
    <img class="modal-thumb" src="${lab.thumb}" alt="${lab.name}">
    <div class="modal-info">
      <div class="modal-head">
        <span class="lab-id mono">${lab.id}</span>
        <span class="cat-tag mono">${lab.category}</span>
        <span class="diff-badge diff-${lab.difficulty} mono">${lab.difficulty}</span>
      </div>
      <div class="modal-title">${lab.name}</div>
      <div class="modal-desc">${lab.description}</div>
      <div class="modal-details">
        <div class="detail-item">
          <span class="detail-label mono">Herramientas</span>
          <span class="detail-value mono">${lab.tools}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label mono">Rango IP</span>
          <span class="detail-value mono">${lab.net}</span>
        </div>
        <div class="detail-item">
          <span class="detail-label mono">Misiones</span>
          <span class="detail-value">${lab.missions}</span>
        </div>
      </div>
      <button class="modal-cta">
        Iniciar lab
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </button>
    </div>
  `;
}

function updateArrows() {
  prevBtn.classList.toggle('hidden', currentIndex <= 0);
  nextBtn.classList.toggle('hidden', currentIndex >= LABS.length - 1);
}

// ── Open modal ──
function openModal(index) {
  if (isOpen || isClosing) return;
  currentIndex = index;
  renderContent(index);
  updateArrows();
  overlay.classList.remove('closing');
  overlay.classList.add('open');
  isOpen = true;
  document.body.style.overflow = 'hidden';
}

// ── Close modal ──
function closeModal() {
  if (!isOpen || isClosing) return;
  isClosing = true;
  overlay.classList.remove('open');
  overlay.classList.add('closing');
  setTimeout(() => {
    overlay.classList.remove('closing', 'open');
    isOpen = false;
    isClosing = false;
    document.body.style.overflow = '';
  }, 210);
}

// ── Navigate ──
function goPrev() {
  if (currentIndex > 0) {
    currentIndex--;
    renderContent(currentIndex);
    updateArrows();
  }
}
function goNext() {
  if (currentIndex < LABS.length - 1) {
    currentIndex++;
    renderContent(currentIndex);
    updateArrows();
  }
}

// ── Events ──
closeBtn.addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeModal();
});
prevBtn.addEventListener('click', goPrev);
nextBtn.addEventListener('click', goNext);

document.addEventListener('keydown', (e) => {
  if (!isOpen) return;
  if (e.key === 'Escape') closeModal();
  if (e.key === 'ArrowLeft') goPrev();
  if (e.key === 'ArrowRight') goNext();
});
</script>
</body>
</html>
